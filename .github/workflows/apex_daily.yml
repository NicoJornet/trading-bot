name: APEX v31 Daily Signal

on:
  schedule:
    - cron: "0 6 * * 1-5"
  workflow_dispatch:

jobs:
  run-apex:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Refresh dynamic universe database
      run: |
        python refresh_dynamic_universe_database.py --profiles targeted_current,broad_diversified

    - name: Run APEX v31
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        python apex_v31_optimized_production.py

    - name: Commit updated runtime files
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add portfolio.json trades_history.json data/dynamic_universe
        git diff --staged --quiet || git commit -m "Update live state $(date +'%Y-%m-%d %H:%M')"
        git push
