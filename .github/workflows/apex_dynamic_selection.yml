name: APEX Dynamic Universe Selection

on:
  schedule:
    - cron: "0 6 * * 6"
  workflow_dispatch:

jobs:
  refresh-dynamic-selection:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Refresh full dynamic live layer
      run: |
        python refresh_dynamic_universe_live_layer.py --profiles targeted_current,broad_focus,broad_diversified

    - name: Commit dynamic selection files
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data/dynamic_universe research/exports research/reports
        git diff --staged --quiet || git commit -m "Update dynamic universe selection $(date +'%Y-%m-%d %H:%M')"
        git push
